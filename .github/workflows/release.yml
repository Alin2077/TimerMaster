name: Release
on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install NSIS (for Windows installer)
        run: choco install nsis -y
        continue-on-error: true

      - name: Install npm dependencies
        run: npm install

      - name: Build Tauri app (signed)
        run: npm run tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      # 代码签名——可选，仅在配置了证书时才执行
      - name: Sign binaries (optional)
        shell: pwsh
        env:
          CERT_BASE64: ${{ secrets.WINDOWS_CERT_BASE64 }}
          CERT_PASSWORD: ${{ secrets.WINDOWS_CERT_PASSWORD }}
        run: |
          if (-not $env:CERT_BASE64) {
            Write-Host "::warning::WINDOWS_CERT_BASE64 未配置，跳过代码签名"
            exit 0
          }
          $certBytes = [Convert]::FromBase64String($env:CERT_BASE64)
          $certPath = Join-Path $env:RUNNER_TEMP "cert.pfx"
          [IO.File]::WriteAllBytes($certPath, $certBytes)

          $files = Get-ChildItem -Path "src-tauri/target/release/bundle" -Recurse -Include "*.exe"
          $signtool = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin\*\x64\signtool.exe" |
                      Select-Object -First 1 -ExpandProperty FullName
          foreach ($file in $files) {
            Write-Host "Signing: $($file.Name)"
            & $signtool sign /fd SHA256 /f $certPath /p $env:CERT_PASSWORD `
              /tr http://timestamp.digicert.com /td SHA256 "$($file.FullName)"
          }

      # 生成 updater.json（自动更新元数据）
      - name: Generate updater.json
        shell: pwsh
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          $version = $env:TAG_NAME -replace '^v', ''
          $installerName = "TimerMaster_${version}_x64-setup.exe"
          $sigFile = "src-tauri/target/release/bundle/nsis/${installerName}.sig"

          # 读取签名文件
          $signature = ""
          if (Test-Path $sigFile) {
            $signature = Get-Content $sigFile -Raw | ForEach-Object { $_.Trim() }
          }

          # 构建下载 URL
          $downloadUrl = "https://github.com/Alin2077/TimerMaster/releases/download/$env:TAG_NAME/$installerName"

          # 生成 updater.json
          $updater = @{
            version = $version
            notes = "自动更新: TimerMaster $version"
            pub_date = (Get-Date -Format "o")
            platforms = @{
              "windows-x86_64" = @{
                signature = $signature
                url = $downloadUrl
              }
            }
          }

          $updaterPath = "src-tauri/target/release/bundle/nsis/updater.json"
          $updater | ConvertTo-Json -Depth 10 | Out-File -FilePath $updaterPath -Encoding UTF8
          Write-Host "✅ updater.json generated at: $updaterPath"
          Get-Content $updaterPath

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: TimerMaster-windows
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/nsis/*.sig
            src-tauri/target/release/bundle/nsis/updater.json

  create-release:
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: TimerMaster-windows
          path: ./release-assets

      - name: List downloaded assets
        run: ls -la ./release-assets/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: ./release-assets/**/*
          generate_release_notes: true
