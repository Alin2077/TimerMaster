name: Release
on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install npm dependencies
        run: npm install

      - name: Build Tauri app
        run: npm run tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      # 代码签名——可选，仅在配置了证书时才执行
      - name: Sign binaries
        shell: pwsh
        env:
          CERT_BASE64: ${{ secrets.WINDOWS_CERT_BASE64 }}
          CERT_PASSWORD: ${{ secrets.WINDOWS_CERT_PASSWORD }}
        run: |
          if (-not $env:CERT_BASE64) {
            Write-Host "::warning::WINDOWS_CERT_BASE64 未配置，跳过代码签名"
            exit 0
          }
          $certBytes = [Convert]::FromBase64String($env:CERT_BASE64)
          $certPath = Join-Path $env:RUNNER_TEMP "cert.pfx"
          [IO.File]::WriteAllBytes($certPath, $certBytes)

          $files = Get-ChildItem -Path "src-tauri/target/release/bundle" -Recurse -Include "*.msi", "*.exe"
          $signtool = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin\*\x64\signtool.exe" |
                      Select-Object -First 1 -ExpandProperty FullName
          foreach ($file in $files) {
            Write-Host "Signing: $($file.Name)"
            & $signtool sign /fd SHA256 /f $certPath /p $env:CERT_PASSWORD `
              /tr http://timestamp.digicert.com /td SHA256 "$($file.FullName)"
          }

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: TimerMaster-windows
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe

  create-release:
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: TimerMaster-windows
          path: ./release-assets

      - name: List downloaded assets
        run: ls -la ./release-assets/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: ./release-assets/**/*
          generate_release_notes: true
